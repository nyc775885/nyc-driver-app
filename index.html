<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <!-- Allow user zoom for accessibility (use font-size:16px on inputs to prevent iOS zoom-on-focus) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1F1B26" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NYC Driver" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>NYC Driver Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      background: #1F1B26;
      color: #E8EAF0;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', 'Segoe UI', Roboto, sans-serif;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum", "ss01", "cv11";
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
      letter-spacing: -0.01em;
    }
    #root { min-height: 100vh; }
    /* font-size: 16px on inputs prevents iOS Safari from zooming on focus */
    input, select, textarea, button {
      font-family: inherit;
      font-size: 16px;
      font-variant-numeric: tabular-nums;
    }
    select { color: #E8EAF0 !important; background: #080E1C !important; }
    select option { background: #152135 !important; color: #E8EAF0 !important; }
    input[type="date"], input[type="month"] { color-scheme: dark; color: #E8EAF0 !important; }
    /* Remove spinner arrows from number inputs */
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; appearance: textfield; }
    .noscript-msg { padding: 40px 20px; text-align: center; line-height: 1.7; }
  @keyframes toastIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
  <noscript>
    <div class="noscript-msg">
      <h2>需要启用 JavaScript / JavaScript required</h2>
      <p>请在浏览器设置中启用 JavaScript 后刷新页面。</p>
      <p>Please enable JavaScript in your browser settings and reload.</p>
    </div>
  </noscript>
  <div id="root"></div>
  <!--

      integrity="sha384-..." crossorigin="anonymous"
    Get hashes from https://www.srihash.org/ or cdnjs.com.

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="app.js?v=337"></script>
  <script>
    // PWA service worker: aggressive auto-update strategy.
    // 1. Register on load
    // 2. Check for updates every 60 seconds while app is open
    // 3. Also check whenever app comes back to foreground
    // 4. When new version installs, activate and reload page once
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' })
          .then(function (reg) {
            // Periodically check for updates while app is running
            setInterval(function () {
              reg.update().catch(function () {});
            }, 60000);

            // Also check immediately when user returns to the tab/app
            document.addEventListener('visibilitychange', function () {
              if (document.visibilityState === 'visible') {
                reg.update().catch(function () {});
              }
            });

            // When a new SW finishes installing, tell it to skip waiting
            reg.addEventListener('updatefound', function () {
              var newSW = reg.installing;
              if (!newSW) return;
              newSW.addEventListener('statechange', function () {
                if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                  newSW.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
          })
          .catch(function (err) { console.warn('SW registration failed:', err); });

        // When the active SW changes, reload once to pick up new assets
        var refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      });
    }
  </script>
</body>
</html>
