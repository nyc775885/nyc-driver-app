<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <!-- Allow user zoom for accessibility (use font-size:16px on inputs to prevent iOS zoom-on-focus) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0A0E1A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="NYC Driver" />
  <link rel="manifest" href="manifest.json" />
  <!-- Favicons -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png" />
  <!-- Apple Touch Icons (iPhone home screen) -->
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
  <link rel="apple-touch-icon" sizes="152x152" href="icon-152.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <!-- Theme color matches new icon -->
  <meta name="msapplication-TileColor" content="#5538EE" />
  <meta name="msapplication-TileImage" content="icon-144.png" />
  <title>NYC Driver Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      /* Iced-coffee background — subtle radial gradient gives "depth" without distraction */
      background: #1A140F;
      background-image:
        radial-gradient(ellipse 800px 600px at 15% 0%, rgba(80,55,35,0.35), transparent 60%),
        radial-gradient(ellipse 600px 500px at 85% 100%, rgba(60,40,25,0.25), transparent 55%),
        linear-gradient(180deg, #1A140F 0%, #15100C 100%);
      background-attachment: fixed;
      color: #F5E8D5;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Noto Sans SC', 'Segoe UI', Roboto, sans-serif;
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum", "ss01", "cv11";
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overscroll-behavior: none;
      letter-spacing: -0.01em;
    }
    #root { min-height: 100vh; }
    /* font-size: 16px on inputs prevents iOS Safari from zooming on focus */
    input, select, textarea, button {
      font-family: inherit;
      font-size: 16px;
      font-variant-numeric: tabular-nums;
    }
    select { color: #F5E8D5 !important; background: #1F1812 !important; }
    select option { background: #2A2018 !important; color: #F5E8D5 !important; }
    input[type="date"], input[type="month"] { color-scheme: dark; color: #F5E8D5 !important; }
    input[type="number"]::-webkit-outer-spin-button,
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; appearance: textfield; }
    .noscript-msg { padding: 40px 20px; text-align: center; line-height: 1.7; }

    /* === ANIMATIONS === */
    @keyframes toastIn{from{opacity:0;transform:translateY(8px) scale(0.96);}to{opacity:1;transform:translateY(0) scale(1);}}
    @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
    @keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    @keyframes cardPop{0%{opacity:0;transform:translateY(8px) scale(0.98);}60%{transform:translateY(-2px) scale(1.005);}100%{opacity:1;transform:translateY(0) scale(1);}}
    @keyframes savePop{0%,100%{transform:scale(1);}30%{transform:scale(1.04);}60%{transform:scale(0.98);}}
    @keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
    @keyframes softGlow{0%,100%{filter:drop-shadow(0 0 0 rgba(212,165,116,0));}50%{filter:drop-shadow(0 0 8px rgba(212,165,116,0.35));}}

    /* Stagger card entrance — apply via inline style: animation: cardPop 0.45s cubic-bezier(0.4,0,0.2,1) backwards; animationDelay: 100ms etc */
    .card-pop { animation: cardPop 0.45s cubic-bezier(0.4,0,0.2,1) backwards; }
    .save-pop { animation: savePop 0.5s cubic-bezier(0.34,1.56,0.64,1); }

    /* Button feedback — press, hover */
    button { transition: transform 0.12s ease, filter 0.15s ease, box-shadow 0.2s ease; }
    button:active:not(:disabled) { transform: scale(0.96); }
    @media (hover:hover){
      button:hover:not(:disabled){ filter: brightness(1.10); }
    }

    /* Big-number gradient text — caramel → honey */
    .big-num-gradient {
      background: linear-gradient(135deg, #F5D89A 0%, #E8B860 50%, #D4A574 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 1px 2px rgba(232,184,96,0.18));
    }
    .big-num-success {
      background: linear-gradient(135deg, #B5D89A 0%, #8FB779 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .big-num-danger {
      background: linear-gradient(135deg, #DC8870 0%, #C26B4F 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Scrollbar — coffee tones */
    ::-webkit-scrollbar{width:6px;height:6px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:#3A2C1F;border-radius:3px;}
    ::-webkit-scrollbar-thumb:hover{background:#5A3F2A;}
  </style>
</head>
<body>
  <noscript>
    <div class="noscript-msg">
      <h2>需要启用 JavaScript / JavaScript required</h2>
      <p>请在浏览器设置中启用 JavaScript 后刷新页面。</p>
      <p>Please enable JavaScript in your browser settings and reload.</p>
    </div>
  </noscript>
  <div id="root"></div>

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <!-- PDF.js for in-browser PDF text extraction (Uber statement import etc.) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" crossorigin="anonymous"></script>
  <script>
    if (window['pdfjsLib']) {
      window['pdfjsLib'].GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  </script>
  <!-- SheetJS for Excel/CSV import & export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" crossorigin="anonymous"></script>
  <script src="app.js?v=709"></script>
  <script>
    // PWA service worker: aggressive auto-update strategy.
    // 1. Register on load
    // 2. Check for updates every 60 seconds while app is open
    // 3. Also check whenever app comes back to foreground
    // 4. When new version installs, activate and reload page once
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js', { updateViaCache: 'none' })
          .then(function (reg) {
            // Periodically check for updates while app is running
            setInterval(function () {
              reg.update().catch(function () {});
            }, 60000);

            // Also check immediately when user returns to the tab/app
            document.addEventListener('visibilitychange', function () {
              if (document.visibilityState === 'visible') {
                reg.update().catch(function () {});
              }
            });

            // When a new SW finishes installing, tell it to skip waiting
            reg.addEventListener('updatefound', function () {
              var newSW = reg.installing;
              if (!newSW) return;
              newSW.addEventListener('statechange', function () {
                if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
                  newSW.postMessage({ type: 'SKIP_WAITING' });
                }
              });
            });
          })
          .catch(function (err) { console.warn('SW registration failed:', err); });

        // When the active SW changes, reload once to pick up new assets
        var refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
      });
    }
  </script>
</body>
</html>
